<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>管理（札幌ホテルリスト）</title>
<style>
  body{font-family:Meiryo,'メイリオ',sans-serif;background:linear-gradient(145deg,#c0c0c0,#e0e0e0);margin:0;padding:14px;color:#222}
  .section-title{font-size:20px;margin:10px 0 6px;text-align:center;font-weight:bold}
  .panel{background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px;margin:10px auto;max-width:1100px}
  /* 新着情報パネルをミントグリーンに */
  .panel:first-of-type {
    background: #e0f0e8;  /* ミントグリーン */
    border: 2px solid #8ab3a0;
  }
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .row input[type="text"], .row textarea{flex:1;padding:8px;border:1px solid #bbb;border-radius:6px;font-size:16px}
  .row label{min-width:72px}
  .btn{padding:10px 14px;border-radius:10px;border:2px solid #777;background:linear-gradient(#fff,#ccc);font-weight:700;cursor:pointer}
  .btn-danger{border-color:#b44;background:linear-gradient(#fff,#f3c0c0)}
  .btn-primary{border-color:#357;background:linear-gradient(#fff,#cfe0ff)}
  .btn-success{border-color:#274;background:linear-gradient(#fff,#cfc)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .grid-kana{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
  .grid-alpha{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}
  .btn-k{padding:8px 0;border-radius:9999px;border:1px solid #999;background:linear-gradient(#fff,#ddd);font-weight:700;cursor:pointer}
  .btn-a{padding:8px 0;border-radius:9999px;border:1px solid #999;background:linear-gradient(#fff,#ddd);font-weight:700;cursor:pointer}
  .card{background:#fafafa;border:1px solid #ddd;border-radius:10px;padding:10px;margin-top:8px}
  .hint{font-size:12px;color:#555}
  .separator{height:1px;background:linear-gradient(90deg,transparent,#ccc,transparent);margin:10px 0}
  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px}
  .mini{padding:8px 10px}
  .right{display:flex;justify-content:flex-end}
  .nowrap{white-space:nowrap}
  .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace}
  .new-hotel-panel{background:#e8f0fe;border:2px solid #6c8ebf;border-radius:10px;padding:12px;margin-top:15px}
  /* 印刷 */
  @page{size:A4 landscape;margin:15mm}
  @media print{
    body{background:#fff;color:#000;-webkit-print-color-adjust:exact;print-color-adjust:exact;width:100%;margin:0;padding:0}
    .no-print{display:none !important}
    #printArea{display:block !important}
    table.print{width:100%;border-collapse:collapse;font-size:10pt;page-break-inside:avoid}
    table.print th,table.print td{border:1px solid #000;padding:4px 6px;vertical-align:top}
    table.print th{background-color:#f0f0f0;font-weight:bold}
    .print-title{font-size:18pt;font-weight:700;text-align:center;margin:5mm 0 3mm 0}
    .print-news{text-align:center;margin:0 0 5mm 0;padding:3mm;border:1px solid #ccc;background-color:#f9f9f9;font-size:11pt}
    tr{page-break-inside:avoid}
    thead{display:table-header-group}
    tbody{display:table-row-group}
    .print-header{display:block}
    .page-break{page-break-after:always}
  }
  #printArea{display:none}
</style>
</head>
<body>
  <div class="panel no-print">
    <h2 class="section-title">新着情報</h2>
    <div class="row">
      <label>1</label><input id="n1" type="text" placeholder="例：🆕 グランドオープン（中央区○○）">
    </div>
    <div class="row">
      <label>2</label><input id="n2" type="text" placeholder="例：📌 リニューアル（駅前通り北側）">
    </div>
    <div class="row">
      <label>3</label><input id="n3" type="text" placeholder="例：🛈 臨時休業（〜10/31）">
    </div>
    <div class="right">
      <button class="btn" onclick="previewWithNews()">🔍 プレビュー（URL生成）</button>
      <button class="btn btn-primary" onclick="saveNewsToJSON()" style="margin-left:8px;">💾 新着情報を保存</button>
    </div>
    <div class="hint">※ 「プレビュー」でトップページを確認、「保存」で新着情報をGitHubに保存します。</div>
  </div>

  <div class="panel no-print">
    <h2 class="section-title">ホテル編集（既存データ）</h2>

    <div class="grid-kana">
      <button class="btn-k" data-g="あ">あ</button><button class="btn-k" data-g="か">か</button>
      <button class="btn-k" data-g="さ">さ</button><button class="btn-k" data-g="た">た</button>
      <button class="btn-k" data-g="な">な</button><button class="btn-k" data-g="は">は</button>
      <button class="btn-k" data-g="ま">ま</button><button class="btn-k" data-g="や">や</button>
      <button class="btn-k" data-g="ら">ら</button><button class="btn-k" data-g="わ">わ</button>
    </div>
    <div class="grid-alpha">
      <button class="btn-a" data-g="ABCDE">ABCDE</button>
      <button class="btn-a" data-g="FGHIJ">FGHIJ</button>
      <button class="btn-a" data-g="KLMNO">KLMNO</button>
      <button class="btn-a" data-g="PQRST">PQRST</button>
      <button class="btn-a" data-g="UVWX">UVWX</button>
      <button class="btn-a" data-g="YZ">YZ</button>
    </div>

    <div id="card" class="card">
      <div class="row">
        <label>頭文字</label>
        <input id="fInitial" type="text" placeholder="あ / A">
        <label>ホテル名</label>
        <input id="fName" type="text" placeholder="ホテル◯◯">
      </div>
      <div class="row">
        <label>住所</label>
        <input id="fAddress" type="text" placeholder="札幌市◯◯区…">
      </div>
      <div class="row">
        <label>備考</label>
        <textarea id="fNote" rows="3" placeholder="例：南2条通北側、駅近、旧名称あり など"></textarea>
      </div>

      <div class="separator"></div>
      <div class="controls">
        <button class="btn mini" id="btnPrev">◀ 前へ</button>
        <span class="nowrap">（<span id="pos">0</span>/<span id="len">0</span>）</span>
        <button class="btn mini" id="btnNext">▶ 次へ</button>

        <input id="jumpHead" class="mono" type="text" placeholder="ホテル名で検索" style="min-width:180px">
        <button class="btn mini" id="btnSearch">🔍 検索</button>

        <button class="btn mini btn-primary" id="btnSave">💾 保存</button>
        <button class="btn mini btn-danger" id="btnDelete">🗑 削除</button>
      </div>

      <div class="hint">※ 五十音／英字ボタンでグループを絞れます。編集後は「保存」ボタンで更新、CSVエクスポートも併用ください。</div>
    </div>
  </div>

  <!-- 新規ホテル登録セクション -->
  <div class="panel no-print new-hotel-panel">
    <h2 class="section-title">📝 新規ホテル登録（名前順に自動挿入）</h2>
    <div class="row">
      <label>頭文字</label>
      <input id="newInitial" type="text" placeholder="あ / A">
      <label>ホテル名</label>
      <input id="newName" type="text" placeholder="ホテル名（必須）">
    </div>
    <div class="row">
      <label>住所</label>
      <input id="newAddress" type="text" placeholder="札幌市…">
    </div>
    <div class="row">
      <label>備考</label>
      <textarea id="newNote" rows="2" placeholder="備考"></textarea>
    </div>
    <div class="controls">
      <button class="btn btn-success" id="btnNewAdd">✨ 新規追加（自動整列）</button>
    </div>
    <div class="hint">入力後「新規追加」で、ホテル名の五十音順に自動的に挿入されます。</div>
  </div>

  <div class="panel no-print">
    <h2 class="section-title">管理ツール</h2>
    <div class="controls">
      <button class="btn" onclick="printAll()">🖨️ プリントアウト</button>
      <label class="btn" for="csvFile">📤 CSVインポート</label><input id="csvFile" type="file" accept=".csv,text/csv" style="display:none">
      <button class="btn" onclick="downloadExcel()">📥 CSVでダウンロード</button>
      
      <!-- ★ トークン入力欄と保存ボタン -->
      <div style="display:flex; gap:8px; margin-left:10px; align-items:center;">
        <input type="password" id="githubToken" placeholder="GitHubトークン（変更時のみ）" style="padding:8px; border-radius:6px; border:1px solid #bbb; width:250px;">
        <button class="btn btn-primary" onclick="saveAllToGitHub()">🚀 すべてGitHubに保存</button>
      </div>
      
      <a class="btn" href="index.html">🏠 トップへ戻る</a>
    </div>
    <div class="hint">※ CSVインポート後は自動で全件置換 → 名前順に整列されます。GitHub保存でCSVと新着情報が同時更新されます。</div>
  </div>

  <!-- 印刷用エリア -->
  <div id="printArea"></div>

<script>
/* ====== 設定：あなたのリポジトリ情報 ====== */
const GH_OWNER = "mjmu-web";
const GH_REPO  = "sapporo_hotel_list";
const CSV_PATH = "data/hotels.csv";
const NEWS_PATH = "data/news.json";

/* ====== 状態 ====== */
let DATA_ALL = [];
let VIEW = [];
let viewIndex = 0;
let currentGroup = null;

/* ====== ルール ====== */
const KANA_RANGES = {
  'あ': /[あいうえおぁぃぅぇぉアァイィウゥエェオォヴ]/,
  'か': /[かきくけこがぎぐげごカキクケコガギグゲゴ]/,
  'さ': /[さしすせそサシスセソ]/,
  'た': /[たちつてとだぢづでどタチツテトダヂヅデド]/,
  'な': /[なにぬねのナニヌネノ]/,
  'は': /[はひふへほばびぶべぼぱぴぷぺぽハヒフヘホバビブベボパピプペポ]/,
  'ま': /[まみむめもマミムメモ]/,
  'や': /[やゆよゃゅょヤユヨ]/,
  'ら': /[らりるれろラリルレロ]/,
  'わ': /[わをんワヲン]/
};
const ALPHA_GROUPS = {
  'ABCDE': 'ABCDE',
  'FGHIJ': 'FGHIJ',
  'KLMNO': 'KLMNO',
  'PQRST': 'PQRST',
  'UVWX': 'UVWX',
  'YZ': 'YZ'
};

/* ====== 起動 ====== */
init();
async function init() {
  await loadCSV();
  sortDataAll();
  
  // JSONから新着情報を読み込む（完了を待つ）
  try {
    await loadNewsFromJSON();
  } catch (e) {
    console.log('JSON読み込みエラー:', e);
  }
  
  // URLパラメータがあれば優先
  loadNewsFromURL();
  
  bindUI();
  VIEW = DATA_ALL.slice();
  currentGroup = null;
  viewIndex = 0;
  updateForm();
}

/* ====== URLから新着情報を読み込み ====== */
function loadNewsFromURL() {
  const params = new URLSearchParams(location.search);
  if (params.get('news1') !== null) {
    document.getElementById('n1').value = params.get('news1') || '';
    document.getElementById('n2').value = params.get('news2') || '';
    document.getElementById('n3').value = params.get('news3') || '';
  }
}

/* ====== news.jsonから新着情報を読み込む ====== */
async function loadNewsFromJSON() {
  try {
    const r = await fetch(NEWS_PATH + '?t=' + Date.now(), {
      cache: 'no-store',
      headers: {
        'Pragma': 'no-cache',
        'Cache-Control': 'no-cache'
      }
    });
    
    if (!r.ok) {
      if (r.status === 404) {
        console.log('news.jsonはまだ存在しません');
        return;
      }
      throw new Error(`HTTP ${r.status}`);
    }
    
    const news = await r.json();
    console.log('新着情報を読み込みました:', news);
    
    document.getElementById('n1').value = news.news1 || '';
    document.getElementById('n2').value = news.news2 || '';
    document.getElementById('n3').value = news.news3 || '';
    
  } catch (e) {
    console.log('新着情報の読み込みに失敗:', e);
  }
}

/* ====== 新着情報をJSONとして保存 ====== */
async function saveNewsToJSON() {
  const token = document.getElementById('githubToken').value;
  if (!token) {
    alert('GitHubトークンを入力してください');
    return;
  }
  
  const newsData = {
    news1: document.getElementById('n1').value || '',
    news2: document.getElementById('n2').value || '',
    news3: document.getElementById('n3').value || '',
    updated: new Date().toISOString()
  };
  
  try {
    await saveFileToGitHub(token, NEWS_PATH, JSON.stringify(newsData, null, 2), 'Update news.json from admin panel');
    alert('✅ 新着情報を保存しました');
  } catch (e) {
    alert('❌ 保存に失敗しました: ' + e.message);
  }
}

/* ====== プレビュー（URL生成）- 修正版 ====== */
function previewWithNews() {
  const n1 = encodeURIComponent(document.getElementById('n1').value || '');
  const n2 = encodeURIComponent(document.getElementById('n2').value || '');
  const n3 = encodeURIComponent(document.getElementById('n3').value || '');
  
  // 空のパラメータは除外
  const params = new URLSearchParams();
  if (n1) params.set('news1', n1);
  if (n2) params.set('news2', n2);
  if (n3) params.set('news3', n3);
  
  const queryString = params.toString();
  const url = 'index.html' + (queryString ? '?' + queryString : '');
  
  // 新しいタブで開く
  window.open(url, '_blank');
}

/* ====== CSV読込 ====== */
async function loadCSV() {
  try {
    const r = await fetch(CSV_PATH + '?t=' + Date.now(), { cache: 'no-store' });
    const t = await r.text();
    const lines = t.trim().split(/\r?\n/).filter(Boolean);
    
    let startLine = 0;
    const firstLine = lines[0] || '';
    if (firstLine.includes('頭文字') || firstLine.includes('initial')) {
      startLine = 1;
    }
    
    const dataLines = lines.slice(startLine);
    
    DATA_ALL = dataLines.map(l => {
      const p = l.split(',');
      return { 
        initial: p[0] || '', 
        name: p[1] || '', 
        address: p[2] || '', 
        note: p[3] || ''
      };
    });
    console.log('読み込み完了:', DATA_ALL.length, '件');
  } catch (e) {
    alert('CSVの読み込みに失敗: ' + e.message);
    DATA_ALL = [];
  }
}

/* ====== 並べ替え ====== */
function sortDataAll() {
  DATA_ALL.sort((a, b) => 
    (a.name || '').localeCompare((b.name || ''), 'ja')
  );
}

/* ====== データ変更後の共通処理 ====== */
function refreshAfterDataChange() {
  sortDataAll();
  if (currentGroup) {
    applyGroup(currentGroup);
  } else {
    VIEW = DATA_ALL.slice();
    viewIndex = Math.min(viewIndex, VIEW.length - 1);
    if (viewIndex < 0) viewIndex = 0;
    updateForm();
  }
}

/* ====== UIバインド ====== */
function bindUI() {
  // グローバル関数として公開
  window.previewWithNews = previewWithNews;
  window.saveNewsToJSON = saveNewsToJSON;
  window.printAll = printAll;
  window.downloadExcel = downloadExcel;
  window.saveAllToGitHub = saveAllToGitHub;
  
  document.querySelectorAll('[data-g]').forEach(b => {
    b.addEventListener('click', () => applyGroup(b.getAttribute('data-g')));
  });

  document.getElementById('btnPrev').addEventListener('click', () => move(-1));
  document.getElementById('btnNext').addEventListener('click', () => move(1));
  
  document.getElementById('btnSave').addEventListener('click', saveCurrentEdit);
  document.getElementById('btnDelete').addEventListener('click', delCurrent);
  document.getElementById('btnSearch').addEventListener('click', searchByName);
  document.getElementById('csvFile').addEventListener('change', onImportCSV);
  document.getElementById('btnNewAdd').addEventListener('click', addNewHotel);
}

/* ====== グループ適用 ====== */
function applyGroup(g) {
  currentGroup = g;
  if (KANA_RANGES[g]) {
    VIEW = DATA_ALL.filter(h => {
      const head = (h.name || '').replace(/^ホテル\s*/,'').trim().charAt(0);
      return KANA_RANGES[g].test(head);
    });
  } else {
    const set = (ALPHA_GROUPS[g] || '');
    VIEW = DATA_ALL.filter(h => {
      const head = ((h.name || '').replace(/^ホテル\s*/,'').trim().charAt(0) || '').toUpperCase();
      return set.includes(head);
    });
  }
  VIEW.sort((a, b) => (a.name || '').localeCompare((b.name || ''), 'ja'));
  viewIndex = 0;
  updateForm();
}

/* ====== フォーム更新 ====== */
function updateForm() {
  const h = VIEW[viewIndex] || {};
  document.getElementById('fInitial').value = h.initial || '';
  document.getElementById('fName').value = h.name || '';
  document.getElementById('fAddress').value = h.address || '';
  document.getElementById('fNote').value = h.note || '';
  
  document.getElementById('pos').textContent = (VIEW.length > 0 ? viewIndex + 1 : 0);
  document.getElementById('len').textContent = VIEW.length;
  
  document.getElementById('btnPrev').disabled = (viewIndex <= 0);
  document.getElementById('btnNext').disabled = (viewIndex >= VIEW.length - 1);
  document.getElementById('btnDelete').disabled = (VIEW.length === 0);
}

function move(delta) {
  viewIndex = Math.max(0, Math.min(VIEW.length - 1, viewIndex + delta));
  updateForm();
}

function searchByName() {
  const query = document.getElementById('jumpHead').value.toLowerCase().trim();
  if (!query) return;
  for (let i = 0; i < VIEW.length; i++) {
    if ((VIEW[i].name || '').toLowerCase().includes(query)) {
      viewIndex = i;
      updateForm();
      return;
    }
  }
  alert('該当なし');
}

/* ====== 保存 ====== */
function saveCurrentEdit() {
  if (VIEW.length === 0) return;
  const currentHotel = VIEW[viewIndex];

  currentHotel.initial = document.getElementById('fInitial').value.trim();
  currentHotel.name = document.getElementById('fName').value.trim();
  currentHotel.address = document.getElementById('fAddress').value.trim();
  currentHotel.note = document.getElementById('fNote').value.trim();

  if (!currentHotel.name) {
    alert('ホテル名は必須です');
    return;
  }

  refreshAfterDataChange();

  const newIndex = VIEW.findIndex(h => h === currentHotel);
  viewIndex = newIndex !== -1 ? newIndex : 0;
  updateForm();
  alert('保存しました');
}

/* ====== 新規追加 ====== */
function addNewHotel() {
  const newHotel = {
    initial: document.getElementById('newInitial').value.trim(),
    name: document.getElementById('newName').value.trim(),
    address: document.getElementById('newAddress').value.trim(),
    note: document.getElementById('newNote').value.trim()
  };
  if (!newHotel.name) {
    alert('ホテル名は必須');
    return;
  }
  DATA_ALL.push(newHotel);
  refreshAfterDataChange();

  document.getElementById('newInitial').value = '';
  document.getElementById('newName').value = '';
  document.getElementById('newAddress').value = '';
  document.getElementById('newNote').value = '';

  viewIndex = VIEW.findIndex(h => h.name === newHotel.name && h.address === newHotel.address);
  if (viewIndex === -1) viewIndex = 0;
  updateForm();
  alert('新規ホテルを正しい順序に追加しました');
}

/* ====== 削除 ====== */
function delCurrent() {
  if (!confirm('本当に削除しますか？')) return;
  const hotelToDelete = VIEW[viewIndex];
  DATA_ALL = DATA_ALL.filter(h => h !== hotelToDelete);
  refreshAfterDataChange();
  alert('削除しました');
}

/* ====== CSVダウンロード ====== */
function downloadCSV(content, filename) {
  const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  link.setAttribute('href', url);
  link.setAttribute('download', filename);
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

/* ====== CSVインポート ====== */
function onImportCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const content = e.target.result;
    const lines = content.split(/\r?\n/).filter(Boolean);
    DATA_ALL = lines.map(line => {
      const parts = line.split(',');
      return {
        initial: parts[0] || '',
        name: parts[1] || '',
        address: parts[2] || '',
        note: parts[3] || ''
      };
    });
    refreshAfterDataChange();
    alert(`CSVをインポート（${DATA_ALL.length}件）・名前順に整列済み`);
  };
  reader.readAsText(file);
  event.target.value = '';
}

function downloadExcel() {
  sortDataAll();
  const csvContent = DATA_ALL.map(h => 
    [h.initial, h.name, h.address, h.note].join(',')
  ).join('\n');
  downloadCSV(csvContent, 'hotels_export.csv');
}

/* ====== 印刷 ====== */
function printAll() {
  sortDataAll();
  
  const news1 = document.getElementById('n1').value || '';
  const news2 = document.getElementById('n2').value || '';
  const news3 = document.getElementById('n3').value || '';
  const newsItems = [news1, news2, news3].filter(Boolean);
  const newsText = newsItems.length > 0 ? newsItems.join(' ／ ') : '新着情報はありません';
  
  const printArea = document.getElementById('printArea');
  
  const tableHeader = `
    <thead>
      <tr>
        <th>頭文字</th>
        <th>ホテル名</th>
        <th>住所</th>
        <th>備考</th>
      </tr>
    </thead>
  `;
  
  const firstPageRows = 38;
  
  let html = `
    <div class="print-title">札幌ホテルリスト</div>
    <div class="print-news">📢 ${newsText}</div>
    <table class="print">
      ${tableHeader}
      <tbody>
  `;
  
  const firstPageData = DATA_ALL.slice(0, firstPageRows);
  firstPageData.forEach(h => {
    html += `
      <tr>
        <td>${h.initial || ''}</td>
        <td>${h.name || ''}</td>
        <td>${h.address || ''}</td>
        <td>${h.note || ''}</td>
      </tr>
    `;
  });
  
  html += `</tbody></table>`;
  
  const remainingData = DATA_ALL.slice(firstPageRows);
  for (let i = 0; i < remainingData.length; i += 40) {
    html += `<div class="page-break"></div>`;
    html += `<table class="print">${tableHeader}<tbody>`;
    
    const pageData = remainingData.slice(i, i + 40);
    pageData.forEach(h => {
      html += `
        <tr>
          <td>${h.initial || ''}</td>
          <td>${h.name || ''}</td>
          <td>${h.address || ''}</td>
          <td>${h.note || ''}</td>
        </tr>
      `;
    });
    
    html += `</tbody></table>`;
  }
  
  printArea.innerHTML = html;
  window.print();
}

/* ====== すべてGitHubに保存 ====== */
async function saveAllToGitHub() {
  console.log('【保存前】データ件数:', DATA_ALL.length);
  
  const token = document.getElementById('githubToken').value;
  if (!token) {
    alert('GitHubトークンを入力してください');
    return;
  }
  
  if (!GH_OWNER || !GH_REPO) {
    alert('GitHubの設定（OWNER, REPO）が未入力です');
    return;
  }
  
  if (!confirm(`現在${DATA_ALL.length}件のデータがあります。GitHubに保存しますか？`)) {
    return;
  }
  
  try {
    sortDataAll();
    const csvContent = DATA_ALL.map(h => 
      [h.initial, h.name, h.address, h.note].join(',')
    ).join('\n');
    
    await saveFileToGitHub(token, CSV_PATH, csvContent, 'Update hotels.csv from admin panel');
    
    const newsData = {

    };
    const newsContent = JSON.stringify(newsData, null, 2);

  } catch (e) {

    console.error(e);
  }
}

/* ====== GitHubにファイルを保存 ====== */
async function saveFileToGitHub(token, path, content, message) {
  const apiUrl = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`;
  
  let sha = null;
  try {
    const getRes = await fetch(apiUrl, {
      headers: { 'Authorization': `token ${token}` }
    });
    if (getRes.ok) {
      const current = await getRes.json();
      sha = current.sha;
    }
  } catch (e) {
    console.log('新規ファイル作成:', path);
  }
  
  const putRes = await fetch(apiUrl, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${token}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      message: message,
      content: btoa(unescape(encodeURIComponent(content))),
      sha: sha
    })
  });
  
  if (!putRes.ok) {
    const error = await putRes.json();
    throw new Error(error.message || 'API error');
  }
  
  return putRes.json();
}

<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
<script>
/* ====== スリープ防止機能 ====== */
let wakeLock = null;
const wakeLockIndicator = document.getElementById('wakeLockIndicator');

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLockIndicator.innerHTML = '🔋 スリープ防止: ON';
      wakeLockIndicator.classList.add('active');
      
      wakeLock.addEventListener('release', () => {
        wakeLockIndicator.innerHTML = '💤 スリープ防止: OFF';
        wakeLockIndicator.classList.remove('active');
        wakeLock = null;
      });
      
      console.log('スリープ防止を有効にしました');
    } else {
      wakeLockIndicator.innerHTML = '❌ 未対応';
    }
  } catch (err) {
    console.error('スリープ防止の有効化に失敗:', err);
    wakeLockIndicator.innerHTML = '❌ 失敗';
  }
}

async function releaseWakeLock() {
  if (wakeLock !== null) {
    await wakeLock.release();
    wakeLock = null;
  }
}

async function toggleWakeLock() {
  if (wakeLock === null) {
    await requestWakeLock();
  } else {
    await releaseWakeLock();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  requestWakeLock();
});

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && wakeLock === null) {
    await requestWakeLock();
  }
});

/* ====== 正規化された先頭文字を取得する関数（漢字用initial優先） ====== */
function getNormalizedFirstCharFromHotel(hotel){
  // initial があればそれを優先（カタカナまたは英字が入っている想定）
  if (hotel.initial && hotel.initial.trim() !== '') {
    let init = hotel.initial.trim();
    // ひらがなならカタカナに変換
    if (init >= 'ぁ' && init <= 'ん') {
      init = String.fromCharCode(init.charCodeAt(0) + 0x60);
    }
    return init;
  }
  
  // initialがなければホテル名から取得
  let name = hotel.name || '';
  if (!name) return '';
  
  // ホテルを除去してトリム
  let cleaned = name.replace(/^ホテル\s*/, '').trim();
  
  // 先頭の記号や空白を除去
  cleaned = cleaned.replace(/^[^ぁ-んァ-ン一-龠A-Za-z]+/, '');
  
  if (cleaned.length === 0) return '';
  
  let firstChar = cleaned.charAt(0);
  
  // ひらがなをカタカナに変換
  if (firstChar >= 'ぁ' && firstChar <= 'ん') {
    firstChar = String.fromCharCode(firstChar.charCodeAt(0) + 0x60);
  }
  
  return firstChar;
}

/* ====== 以下、既存の機能 ====== */
let installPromptEvent=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  installPromptEvent=e;
});
document.getElementById('addHome').addEventListener('click',()=>{
  if(installPromptEvent){
    installPromptEvent.prompt();
    installPromptEvent.userChoice.then(()=>installPromptEvent=null);
  }else if(/iphone|ipad|ipod/i.test(navigator.userAgent)){
    alert('Safariの共有メニューから「ホーム画面に追加」を選んでください。');
  }else{
    alert('ブラウザのメニューから「ホーム画面に追加」を選んでください。');
  }
});

let DATA_ALL=[],DATA=[];

async function loadCSV(){
  try {
    const r=await fetch('data/hotels.csv?t=' + Date.now());
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const t=await r.text();
    DATA_ALL=t.trim().split(/\r?\n/).filter(Boolean).map(l=>{
      const p=l.split(',');
      const hotelData = {
        initial:p[0]||'',
        name:p[1]||'',
        address:p[2]||'',
        note:p[3]||''
      };
      hotelData.keywords = generateKeywordsFromName(hotelData.name);
      return hotelData;
    });
    if (DATA_ALL.length === 0) throw new Error('データが空です');
  } catch(e) {
    DATA_ALL = [
      {initial:'ア', name:'アパホテル〈札幌すすきの〉', address:'北海道札幌市中央区南5条西2', note:'大浴場あり', keywords:'アパ すすきの'},
      {initial:'ト', name:'東横INN札幌駅北口', address:'北海道札幌市北区北7条西2', note:'朝食無料', keywords:'東横イン きたぐち'},
      {initial:'マ', name:'マイステイズ札幌すすきの', address:'北海道札幌市中央区南5条西3', note:'', keywords:'マイステイズ すすきの'},
      {initial:'リ', name:'リブマックス札幌', address:'北海道札幌市中央区南4条西5', note:'', keywords:'リブマックス'},
      {initial:'ル', name:'ホテルルートイン札幌', address:'北海道札幌市白石区', note:'駐車場あり', keywords:'ルートイン'},
      {initial:'R', name:'RANDORホテル札幌', address:'北海道札幌市中央区北1条西2', note:'', keywords:'ランドール'},
      {initial:'H', name:'ホテルグレイスリー札幌', address:'北海道札幌市中央区北3条西4', note:'', keywords:'グレイスリー'},
      {initial:'H', name:'ホテルリソル札幌', address:'北海道札幌市中央区南1条西1', note:'', keywords:'リソル'},
      {initial:'ア', name:'アパホテル〈札幌駅前〉', address:'北海道札幌市北区北6条西1', note:'', keywords:'アパ 駅前'},
      {initial:'サ', name:'札幌グランドホテル', address:'北海道札幌市中央区北1条西4', note:'老舗高級ホテル', keywords:'グランド'},
      {initial:'サ', name:'札幌プリンスホテル', address:'北海道札幌市中央区南2条西11', note:'', keywords:'プリンス'},
      {initial:'ホ', name:'ホテルポールスター札幌', address:'北海道札幌市中央区南8条西3', note:'サウナあり', keywords:'ポールスター'}
    ];
  }
  DATA = DATA_ALL.slice();
  render(DATA_ALL);
}

document.addEventListener('DOMContentLoaded', loadCSV);

function generateKeywordsFromName(name) {
  return name
    .replace(/ホテル/g, ' ')
    .replace(/〈/g, ' ')
    .replace(/〉/g, ' ')
    .replace(/by/g, ' ')
    .replace(/[()（）]/g, ' ')
    .split(/\s+/)
    .filter(word => word && word.length > 1)
    .map(word => word.toLowerCase())
    .join(' ');
}

function mapLink(name){
  const ua=navigator.userAgent.toLowerCase();
  const q=encodeURIComponent(name);
  return /iphone|ipad|ipod/.test(ua)
    ? `maps://maps.apple.com/?q=${q}`
    : `https://www.google.com/maps/search/?api=1&query=${q}`;
}

function render(list){
  const el=document.getElementById('results');
  if(list.length === 0){
    el.innerHTML = '<div style="text-align:center;color:#666;margin:20px 0;">該当するホテルが見つかりませんでした</div>';
    return;
  }
  el.innerHTML=list.map(h=>{
    const safeHotel = JSON.stringify(h).replace(/'/g, "\\'");
    return `<div class='card' onclick='enlargeCard(${safeHotel})'>
      <div class='name'>${h.name}</div>
      <div>📍 ${h.address}</div>
      ${h.note?'<div>📝 '+h.note+'</div>':''}
      <div>🔍 <a href='https://www.google.com/search?q=${encodeURIComponent(h.name)}' target='_blank'>Google検索</a> ｜ 🗺️ <a href='${mapLink(h.name)}' target='_blank'>地図</a></div>
    </div>`;
  }).join('');
}

// 各行の文字を判定する関数（濁音・半濁音対応）
function isCharInRow(char, rowType) {
  if (!char) return false;
  
  const rows = {
    'あ': /[あいうえおぁぃぅぇぉアイウエオァィゥェォヴ]/,
    'か': /[かきくけこがぎぐげごカキクケコガギグゲゴ]/,
    'さ': /[さしすせそざじずぜぞサシスセソザジズゼゾ]/,
    'た': /[たちつてとだぢづでどタチツテトダヂヅデド]/,
    'な': /[なにぬねのナニヌネノ]/,
    'は': /[はひふへほばびぶべぼぱぴぷぺぽハヒフヘホバビブベボパピプペポ]/,
    'ま': /[まみむめもマミムメモ]/,
    'や': /[やゆよゃゅょヤユヨ]/,
    'ら': /[らりるれろラリルレロ]/,
    'わ': /[わをんワヲン]/
  };
  
  return rows[rowType] && rows[rowType].test(char);
}

function showInitials(g){
  const kana=['あ','か','さ','た','な','は','ま','や','ら','わ'];
  
  let filtered = [];
  
  if(kana.includes(g)){
    filtered = DATA_ALL.filter(h => {
      const firstChar = getNormalizedFirstCharFromHotel(h);
      return isCharInRow(firstChar, g);
    });
  } else {
    const map = {
      'ABCDE':'ABCDE','FGHIJ':'FGHIJ','KLMNO':'KLMNO',
      'PQRST':'PQRST','UVWX':'UVWX','YZ':'YZ'
    };
    const set = map[g] || '';
    
    filtered = DATA_ALL.filter(h => {
      const firstChar = getNormalizedFirstCharFromHotel(h);
      return set.includes(firstChar);
    });
  }
  
  // ★修正①: 1件の場合は即座に拡大モーダルを表示
  if (filtered.length === 1) {
    enlargeCard(filtered[0]);
    return;
  }
  
  if (filtered.length <= 3) {
    render(filtered);
    return;
  }
  
  showKeywordSelection(filtered, g);
}

function searchByBrand(brand){
  const filtered = DATA_ALL.filter(h => h.name.includes(brand));
  render(filtered);
}

function showKeywordSelection(filtered, group) {
  const keywordMap = {};
  
  filtered.forEach(hotel => {
    const keywords = (hotel.keywords || '').split(' ').filter(k => k.trim() && k.length > 1);
    keywords.forEach(keyword => {
      if (!keywordMap[keyword]) {
        keywordMap[keyword] = [];
      }
      keywordMap[keyword].push(hotel);
    });
  });
  
  const sortedKeywords = Object.keys(keywordMap)
    .sort((a, b) => keywordMap[b].length - keywordMap[a].length);
  
  let contentHTML = '<h3>さらに絞り込む</h3>';
  
  if (sortedKeywords.length > 0) {
    contentHTML += sortedKeywords.map(keyword => {
      const count = keywordMap[keyword].length;
      return `<button onclick="selectKeyword('${keyword}', '${group}')">${keyword} (${count}件)</button>`;
    }).join('');
  } else {
    contentHTML += '<p>絞り込みキーワードがありません</p>';
  }
  
  contentHTML += `<br><button onclick="showAllInGroup('${group}')" style="margin-top:10px;background:#eee;">全${filtered.length}件を表示</button>`;
  
  const overlayContent = document.getElementById('overlay-content');
  overlayContent.innerHTML = contentHTML;
  // 右下に共通の閉じるボタンを追加（角丸黒枠）
  addCloseButtonToOverlay();
  document.getElementById('overlay').style.display = 'flex';
}

function addCloseButtonToOverlay() {
  const overlayContent = document.getElementById('overlay-content');
  // 既存の閉じるボタンがあれば削除して重複防止
  const existingBtn = overlayContent.querySelector('.close-btn-corner');
  if(existingBtn) existingBtn.remove();
  const closeBtn = document.createElement('button');
  closeBtn.textContent = '閉じる';
  closeBtn.className = 'close-btn-corner';
  closeBtn.onclick = function() {
    document.getElementById('overlay').style.display = 'none';
  };
  overlayContent.appendChild(closeBtn);
}

function showAllInGroup(group) {
  closeOverlay();
  
  let filtered = [];
  
  if(['あ','か','さ','た','な','は','ま','や','ら','わ'].includes(group)){
    filtered = DATA_ALL.filter(h => {
      const firstChar = getNormalizedFirstCharFromHotel(h);
      return isCharInRow(firstChar, group);
    });
  } else {
    const map = {
      'ABCDE':'ABCDE','FGHIJ':'FGHIJ','KLMNO':'KLMNO',
      'PQRST':'PQRST','UVWX':'UVWX','YZ':'YZ'
    };
    const set = map[group] || '';
    
    filtered = DATA_ALL.filter(h => {
      const firstChar = getNormalizedFirstCharFromHotel(h);
      return set.includes(firstChar);
    });
  }
  
  // ★修正③: 1件の場合は即座に拡大モーダルを表示
  if (filtered.length === 1) {
    enlargeCard(filtered[0]);
    return;
  }
  
  render(filtered);
}

function selectKeyword(keyword, group) {
  closeOverlay();
  
  const matches = DATA_ALL.filter(h => {
    const firstChar = getNormalizedFirstCharFromHotel(h);

    let groupMatch = false;
    if (['あ','か','さ','た','な','は','ま','や','ら','わ'].includes(group)) {
      groupMatch = isCharInRow(firstChar, group);
    } else {
      const map = {
        'ABCDE':'ABCDE','FGHIJ':'FGHIJ','KLMNO':'KLMNO',
        'PQRST':'PQRST','UVWX':'UVWX','YZ':'YZ'
      };
      const set = map[group] || '';
      groupMatch = set.includes(firstChar);
    }

    const keywordMatch = (h.keywords || '').includes(keyword);

    return groupMatch && keywordMatch;
  });
  
  // ★修正②: 1件の場合は即座に拡大モーダルを表示
  if (matches.length === 1) {
    enlargeCard(matches[0]);
    return;
  }
  
  render(matches);
}

function closeOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

document.addEventListener('click', function(e) {
  if (e.target.matches('[data-g]')) {
    showInitials(e.target.getAttribute('data-g'));
  }
  if (e.target.matches('[data-brand]')) {
    searchByBrand(e.target.getAttribute('data-brand'));
  }
});

function enlargeCard(h){
  const modal = document.getElementById('modal');
  const content = document.getElementById('modal-content');
  content.innerHTML = `
    <h2>${h.name}</h2>
    <p>📍 ${h.address}</p>
    ${h.note ? '<p>📝 ' + h.note + '</p>' : ''}
    <p>🔍 <a href='https://www.google.com/search?q=${encodeURIComponent(h.name)}' target='_blank'>Google検索</a></p>
    <p>🗺️ <a href='${mapLink(h.name)}' target='_blank'>地図</a></p>
  `;
  // 右下に角丸黒枠の閉じるボタンを追加
  const existingBtn = content.querySelector('.close-btn-corner');
  if(existingBtn) existingBtn.remove();
  const closeBtn = document.createElement('button');
  closeBtn.textContent = '閉じる';
  closeBtn.className = 'close-btn-corner';
  closeBtn.onclick = function() {
    closeModal();
  };
  content.appendChild(closeBtn);
  modal.style.display = 'flex';
}
function closeModal(){
  document.getElementById('modal').style.display = 'none';
}

async function loadNewsFromJSON() {
  try {
    const r = await fetch('data/news.json?t=' + Date.now());
    if (!r.ok) throw new Error('News file not found');
    const news = await r.json();
    
    const urlParams = new URLSearchParams(window.location.search);
    const hasUrlParams = urlParams.has('news1') || urlParams.has('news2') || urlParams.has('news3');
    
    if (!hasUrlParams) {
      const newsItems = [news.news1, news.news2, news.news3].filter(Boolean);
      document.getElementById('marqueeAll').textContent = newsItems.join(' ／ ') || '　';
      console.log('news.jsonから読み込み:', newsItems);
    }
  } catch(e) {
    console.log('news.json読み込みエラー:', e);
    if (!document.getElementById('marqueeAll').textContent) {
      applyNews();
    }
  }
}

function applyNews(){
  const p=new URLSearchParams(location.search);
  const joined=[p.get('news1'),p.get('news2'),p.get('news3')]
    .filter(Boolean).map(decodeURIComponent).join(' ／ ');
  document.getElementById('marqueeAll').textContent=joined||'　';
}

let speedWatchID=null;
document.getElementById('speedBtn').addEventListener('click',()=>{
  if(speedWatchID){
    navigator.geolocation.clearWatch(speedWatchID);
    speedWatchID=null;
    document.getElementById('speedArea').innerHTML='';
    return;
  }
  if(!navigator.geolocation){
    alert('この端末では速度を取得できません');
    return;
  }
  speedWatchID=navigator.geolocation.watchPosition(showSpeed,()=>alert('位置情報の取得を許可してください'),{enableHighAccuracy:true});
});
function showSpeed(pos){
  const spd=pos.coords.speed;
  const kmh=(spd||0)*3.6;
  const el=document.getElementById('speedArea');
  let color='white',size='40px';
  if(kmh>=63&&kmh<=65){color='yellow';size='60px';}
  else if(kmh>65){color='red';size='80px';}
  el.innerHTML=`<span style="font-size:${size};color:${color};">${kmh.toFixed(1)} km/h</span>`;
}

const RSS_URL = "https://www.nhk.or.jp/rss/news/cat0.xml";

async function fetchRSS() {
  const newsContent = document.getElementById("newsContent");
  
  const proxies = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?',
    'https://cors-anywhere.herokuapp.com/'
  ];
  
  for (const proxyUrl of proxies) {
    try {
      console.log(`プロキシ試行: ${proxyUrl}`);
      const response = await fetch(proxyUrl + encodeURIComponent(RSS_URL), {
        timeout: 5000
      });
      
      if (!response.ok) continue;
      
      const text = await response.text();
      if (!text || text.length < 100) continue;
      
      const parser = new DOMParser();
      const xml = parser.parseFromString(text, "text/xml");
      
      const parserError = xml.querySelector('parsererror');
      if (parserError) continue;
      
      const items = xml.querySelectorAll("item");
      if (items.length === 0) continue;
      
      const news = Array.from(items).slice(0, 5).map(item => {
        const title = item.querySelector("title")?.textContent || "タイトルなし";
        const link = item.querySelector("link")?.textContent || "#";
        return { title, link };
      });

      newsContent.innerHTML = '';
      news.forEach((n, i) => {
        const prefix = i === 0 ? '🚨' : '📻';
        const el = document.createElement("span");
        el.innerHTML = `${prefix} <a href="${n.link}" target="_blank" style="color:#ffa500;text-decoration:none;border-bottom:1px dotted #ffa500;">${n.title}</a>`;
        newsContent.appendChild(el);
        if (i < news.length - 1) {
          const sep = document.createElement("span");
          sep.textContent = " ● ";
          sep.style.color = "#ff4444";
          newsContent.appendChild(sep);
        }
      });

      document.getElementById("updateTime").textContent = `更新: ${new Date().toLocaleTimeString()}`;
      console.log(`ニュース取得成功 (${proxyUrl})`);
      return;
      
    } catch (e) {
      console.log(`プロキシ失敗 (${proxyUrl}):`, e);
    }
  }
  
  newsContent.innerHTML = '<span class="news-error">📻 ニュース取得に失敗しました</span>';
  console.error('すべてのプロキシが失敗しました');
}

document.addEventListener('DOMContentLoaded', function() {
  const urlParams = new URLSearchParams(window.location.search);
  const news1 = urlParams.get('news1');
  const news2 = urlParams.get('news2');
  const news3 = urlParams.get('news3');
  
  if (news1 || news2 || news3) {
    console.log('プレビューモード: URLパラメータから新着情報を読み込み');
    const marqueeEl = document.getElementById('marqueeAll');
    const newsItems = [news1, news2, news3].filter(Boolean);
    marqueeEl.textContent = newsItems.join(' ／ ') || '　';
    fetchRSS();
  } else {
    console.log('通常モード: news.jsonから新着情報を読み込み');
    loadNewsFromJSON();
    fetchRSS();
  }
  
  setInterval(fetchRSS, 1800000);
});

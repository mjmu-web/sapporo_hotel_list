<script>
// ==================== iOS自動リンク対策関数 ====================
function disableIOSDataDetectors() {
  // すべての要素からiOSが自動生成するリンクを除去
  const allElements = document.querySelectorAll('*');
  allElements.forEach(el => {
    // iOSのデータ検出器が作ったリンクを無効化
    if (el.tagName === 'A' && el.getAttribute('x-apple-data-detectors')) {
      const parent = el.parentNode;
      const text = el.textContent;
      const span = document.createElement('span');
      span.textContent = text;
      span.className = 'address-text';
      span.setAttribute('x-apple-data-detectors', 'false');
      parent.replaceChild(span, el);
    }
    // 属性を付与して自動リンク化を抑制
    if (el.hasAttribute('x-apple-data-detectors')) {
      el.setAttribute('x-apple-data-detectors', 'false');
    }
    // 住所が含まれる可能性のある要素に属性追加
    if (el.textContent && (el.textContent.includes('北海道') || el.textContent.includes('札幌'))) {
      el.setAttribute('x-apple-data-detectors', 'false');
    }
  });
  
  // MutationObserverで動的に追加される要素も監視
  const observer = new MutationObserver(function(mutations) {
    mutations.forEach(function(mutation) {
      mutation.addedNodes.forEach(function(node) {
        if (node.nodeType === 1) {
          if (node.textContent && (node.textContent.includes('北海道') || node.textContent.includes('札幌'))) {
            node.setAttribute('x-apple-data-detectors', 'false');
          }
          const links = node.querySelectorAll ? node.querySelectorAll('[x-apple-data-detectors]') : [];
          links.forEach(link => {
            link.setAttribute('x-apple-data-detectors', 'false');
          });
        }
      });
    });
  });
  observer.observe(document.body, { childList: true, subtree: true });
}

// ==================== スリープ防止機能 ====================
let wakeLock = null;
const wakeLockIndicator = document.getElementById('wakeLockIndicator');

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLockIndicator.innerHTML = '🔋 スリープ防止: ON';
      wakeLockIndicator.classList.add('active');
      wakeLock.addEventListener('release', () => {
        wakeLockIndicator.innerHTML = '💤 スリープ防止: OFF';
        wakeLockIndicator.classList.remove('active');
        wakeLock = null;
      });
    } else {
      wakeLockIndicator.innerHTML = '❌ 未対応';
    }
  } catch (err) {
    wakeLockIndicator.innerHTML = '❌ 失敗';
  }
}

async function releaseWakeLock() {
  if (wakeLock !== null) {
    await wakeLock.release();
    wakeLock = null;
  }
}

async function toggleWakeLock() {
  if (wakeLock === null) {
    await requestWakeLock();
  } else {
    await releaseWakeLock();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  requestWakeLock();
});
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && wakeLock === null) {
    await requestWakeLock();
  }
});

// ==================== ホテルデータ管理 ====================
let DATA_ALL = [], DATA = [];

function getNormalizedFirstCharFromHotel(hotel) {
  if (hotel.initial && hotel.initial.trim() !== '') {
    let init = hotel.initial.trim();
    if (init >= 'ぁ' && init <= 'ん') {
      init = String.fromCharCode(init.charCodeAt(0) + 0x60);
    }
    return init;
  }
  let name = hotel.name || '';
  if (!name) return '';
  let cleaned = name.replace(/^ホテル\s*/, '').trim();
  cleaned = cleaned.replace(/^[^ぁ-んァ-ン一-龠A-Za-z]+/, '');
  if (cleaned.length === 0) return '';
  let firstChar = cleaned.charAt(0);
  if (firstChar >= 'ぁ' && firstChar <= 'ん') {
    firstChar = String.fromCharCode(firstChar.charCodeAt(0) + 0x60);
  }
  return firstChar;
}

function generateKeywordsFromName(name) {
  return name
    .replace(/ホテル/g, ' ')
    .replace(/[〈〉]/g, ' ')
    .replace(/[()（）]/g, ' ')
    .split(/\s+/)
    .filter(word => word && word.length > 1)
    .map(word => word.toLowerCase())
    .join(' ');
}

async function loadCSV() {
  try {
    const r = await fetch('data/hotels.csv?t=' + Date.now());
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const t = await r.text();
    DATA_ALL = t.trim().split(/\r?\n/).filter(Boolean).map(l => {
      const p = l.split(',');
      const hotelData = {
        initial: p[0] || '',
        name: p[1] || '',
        address: p[2] || '',
        note: p[3] || ''
      };
      hotelData.keywords = generateKeywordsFromName(hotelData.name);
      return hotelData;
    });
    if (DATA_ALL.length === 0) throw new Error('データが空です');
  } catch (e) {
    DATA_ALL = [
      {initial:'ア', name:'アパホテル〈札幌すすきの〉', address:'北海道札幌市中央区南5条西2', note:'大浴場あり', keywords:'アパ すすきの'},
      {initial:'ト', name:'東横INN札幌駅北口', address:'北海道札幌市北区北7条西2', note:'朝食無料', keywords:'東横イン きたぐち'},
      {initial:'マ', name:'マイステイズ札幌すすきの', address:'北海道札幌市中央区南5条西3', note:'', keywords:'マイステイズ すすきの'},
      {initial:'リ', name:'リブマックス札幌', address:'北海道札幌市中央区南4条西5', note:'', keywords:'リブマックス'},
      {initial:'ル', name:'ホテルルートイン札幌', address:'北海道札幌市白石区', note:'駐車場あり', keywords:'ルートイン'},
      {initial:'R', name:'RANDORホテル札幌', address:'北海道札幌市中央区北1条西2', note:'', keywords:'ランドール'},
      {initial:'H', name:'ホテルグレイスリー札幌', address:'北海道札幌市中央区北3条西4', note:'', keywords:'グレイスリー'},
      {initial:'H', name:'ホテルリソル札幌', address:'北海道札幌市中央区南1条西1', note:'', keywords:'リソル'},
      {initial:'ア', name:'アパホテル〈札幌駅前〉', address:'北海道札幌市北区北6条西1', note:'', keywords:'アパ 駅前'},
      {initial:'サ', name:'札幌グランドホテル', address:'北海道札幌市中央区北1条西4', note:'老舗高級ホテル', keywords:'グランド'},
      {initial:'サ', name:'札幌プリンスホテル', address:'北海道札幌市中央区南2条西11', note:'', keywords:'プリンス'},
      {initial:'ホ', name:'ホテルポールスター札幌', address:'北海道札幌市中央区南8条西3', note:'サウナあり', keywords:'ポールスター'}
    ];
  }
  DATA = DATA_ALL.slice();
  render(DATA_ALL);
}

function mapLink(name) {
  const ua = navigator.userAgent.toLowerCase();
  const q = encodeURIComponent(name);
  return /iphone|ipad|ipod/.test(ua) ? `maps://maps.apple.com/?q=${q}` : `https://www.google.com/maps/search/?api=1&query=${q}`;
}

function render(list) {
  const el = document.getElementById('results');
  if (list.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:#666;margin:20px 0;">該当するホテルが見つかりませんでした</div>';
    return;
  }
  el.innerHTML = list.map(h => {
    const safeHotel = JSON.stringify(h).replace(/'/g, "\\'");
    // 住所にiOS自動リンク対策の属性とクラスを付与
    const addressEscaped = h.address.replace(/'/g, "\\'");
    return `<div class='card' onclick='enlargeCard(${safeHotel})'>
      <div class='name'>${h.name}</div>
      <div class='address-text' x-apple-data-detectors='false'>📍 ${h.address}</div>
      ${h.note ? '<div>📝 ' + h.note + '</div>' : ''}
      <div>🔍 <a href='https://www.google.com/search?q=${encodeURIComponent(h.name)}' target='_blank'>Google検索</a> ｜ 🗺️ <a href='${mapLink(h.name)}' target='_blank'>地図</a></div>
    </div>`;
  }).join('');
  
  // レンダリング後にiOS自動リンク対策を再度実行
  setTimeout(disableIOSDataDetectors, 10);
}

function isCharInRow(char, rowType) {
  if (!char) return false;
  const rows = {
    'あ': /[あいうえおぁぃぅぇぉアイウエオァィゥェォヴ]/,
    'か': /[かきくけこがぎぐげごカキクケコガギグゲゴ]/,
    'さ': /[さしすせそざじずぜぞサシスセソザジズゼゾ]/,
    'た': /[たちつてとだぢづでどタチツテトダヂヅデド]/,
    'な': /[なにぬねのナニヌネノ]/,
    'は': /[はひふへほばびぶべぼぱぴぷぺぽハヒフヘホバビブベボパピプペポ]/,
    'ま': /[まみむめもマミムメモ]/,
    'や': /[やゆよゃゅょヤユヨ]/,
    'ら': /[らりるれろラリルレロ]/,
    'わ': /[わをんワヲン]/
  };
  return rows[rowType] && rows[rowType].test(char);
}

function showInitials(g) {
  const kana = ['あ','か','さ','た','な','は','ま','や','ら','わ'];
  let filtered = [];
  if (kana.includes(g)) {
    filtered = DATA_ALL.filter(h => isCharInRow(getNormalizedFirstCharFromHotel(h), g));
  } else {
    const map = { 'ABCDE':'ABCDE','FGHIJ':'FGHIJ','KLMNO':'KLMNO','PQRST':'PQRST','UVWX':'UVWX','YZ':'YZ' };
    const set = map[g] || '';
    filtered = DATA_ALL.filter(h => set.includes(getNormalizedFirstCharFromHotel(h)));
  }
  if (filtered.length === 1) {
    enlargeCard(filtered[0]);
    return;
  }
  if (filtered.length <= 3) {
    render(filtered);
    return;
  }
  showKeywordSelection(filtered, g);
}

function searchByBrand(brand) {
  const filtered = DATA_ALL.filter(h => h.name.includes(brand));
  render(filtered);
}

function showKeywordSelection(filtered, group) {
  const keywordMap = {};
  filtered.forEach(hotel => {
    const keywords = (hotel.keywords || '').split(' ').filter(k => k.trim() && k.length > 1);
    keywords.forEach(kw => {
      if (!keywordMap[kw]) keywordMap[kw] = [];
      keywordMap[kw].push(hotel);
    });
  });
  const sortedKeywords = Object.keys(keywordMap).sort((a,b) => keywordMap[b].length - keywordMap[a].length);
  let contentHTML = '<h3>さらに絞り込む</h3>';
  if (sortedKeywords.length > 0) {
    contentHTML += sortedKeywords.map(kw => `<button onclick="selectKeyword('${kw}', '${group}')">${kw} (${keywordMap[kw].length}件)</button>`).join('');
  } else {
    contentHTML += '<p>絞り込みキーワードがありません</p>';
  }
  contentHTML += `<br><button onclick="showAllInGroup('${group}')" style="margin-top:10px;background:#eee;">全${filtered.length}件を表示</button>`;
  const overlayContent = document.getElementById('overlay-content');
  overlayContent.innerHTML = contentHTML;
  addCloseButtonToOverlay();
  document.getElementById('overlay').style.display = 'flex';
}

function addCloseButtonToOverlay() {
  const overlayContent = document.getElementById('overlay-content');
  const existing = overlayContent.querySelector('.close-btn-corner');
  if (existing) existing.remove();
  const btn = document.createElement('button');
  btn.textContent = '閉じる';
  btn.className = 'close-btn-corner';
  btn.onclick = () => document.getElementById('overlay').style.display = 'none';
  overlayContent.appendChild(btn);
}

function showAllInGroup(group) {
  closeOverlay();
  const kana = ['あ','か','さ','た','な','は','ま','や','ら','わ'];
  let filtered = [];
  if (kana.includes(group)) {
    filtered = DATA_ALL.filter(h => isCharInRow(getNormalizedFirstCharFromHotel(h), group));
  } else {
    const map = { 'ABCDE':'ABCDE','FGHIJ':'FGHIJ','KLMNO':'KLMNO','PQRST':'PQRST','UVWX':'UVWX','YZ':'YZ' };
    const set = map[group] || '';
    filtered = DATA_ALL.filter(h => set.includes(getNormalizedFirstCharFromHotel(h)));
  }
  if (filtered.length === 1) {
    enlargeCard(filtered[0]);
    return;
  }
  render(filtered);
}

function selectKeyword(keyword, group) {
  closeOverlay();
  const kana = ['あ','か','さ','た','な','は','ま','や','ら','わ'];
  const matches = DATA_ALL.filter(h => {
    const firstChar = getNormalizedFirstCharFromHotel(h);
    let groupMatch = false;
    if (kana.includes(group)) {
      groupMatch = isCharInRow(firstChar, group);
    } else {
      const map = { 'ABCDE':'ABCDE','FGHIJ':'FGHIJ','KLMNO':'KLMNO','PQRST':'PQRST','UVWX':'UVWX','YZ':'YZ' };
      const set = map[group] || '';
      groupMatch = set.includes(firstChar);
    }
    return groupMatch && (h.keywords || '').includes(keyword);
  });
  if (matches.length === 1) {
    enlargeCard(matches[0]);
    return;
  }
  render(matches);
}

function closeOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

function enlargeCard(h) {
  const modal = document.getElementById('modal');
  const content = document.getElementById('modal-content');
  content.innerHTML = `
    <h2>${h.name}</h2>
    <p x-apple-data-detectors='false' class='address-text'>📍 ${h.address}</p>
    ${h.note ? '<p>📝 ' + h.note + '</p>' : ''}
    <p>🔍 <a href='https://www.google.com/search?q=${encodeURIComponent(h.name)}' target='_blank'>Google検索</a></p>
    <p>🗺️ <a href='${mapLink(h.name)}' target='_blank'>地図</a></p>
  `;
  const existing = content.querySelector('.close-btn-corner');
  if (existing) existing.remove();
  const closeBtn = document.createElement('button');
  closeBtn.textContent = '閉じる';
  closeBtn.className = 'close-btn-corner';
  closeBtn.onclick = () => closeModal();
  content.appendChild(closeBtn);
  modal.style.display = 'flex';
}
function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

// イベント委譲
document.addEventListener('click', e => {
  if (e.target.matches('[data-g]')) showInitials(e.target.getAttribute('data-g'));
  if (e.target.matches('[data-brand]')) searchByBrand(e.target.getAttribute('data-brand'));

// ニュース取得（新着情報ティッカー用）
async function loadNewsFromJSON() {
  try {
    const r = await fetch('data/news.json?t=' + Date.now());
    if (!r.ok) throw new Error();
    const news = await r.json();
    const hasParams = [...new URLSearchParams(location.search).keys()].some(k => k.startsWith('news'));
    if (!hasParams) {
      const items = [news.news1, news.news2, news.news3].filter(Boolean);
      const marqueeEl = document.getElementById('marqueeAll');
      if (items.length > 0) {
        marqueeEl.textContent = items.join(' ／ ');
      } else {
        marqueeEl.textContent = '📢 新着情報はありません';
      }
    }
  } catch (e) {
    applyNews();
  }
}
function applyNews() {
  const p = new URLSearchParams(location.search);
  const joined = [p.get('news1'), p.get('news2'), p.get('news3')].filter(Boolean).map(decodeURIComponent).join(' ／ ');
  const marqueeEl = document.getElementById('marqueeAll');
  marqueeEl.textContent = joined || '📢 新着情報はありません';
}

// 速度表示
let speedWatchID = null;
document.getElementById('speedBtn').addEventListener('click', () => {
  if (speedWatchID) {
    navigator.geolocation.clearWatch(speedWatchID);
    speedWatchID = null;
    document.getElementById('speedArea').innerHTML = '';
    return;
  }
  if (!navigator.geolocation) return alert('位置情報を取得できません');
  speedWatchID = navigator.geolocation.watchPosition(pos => {
    const kmh = (pos.coords.speed || 0) * 3.6;
    document.getElementById('speedArea').innerHTML = `<span style="font-size:${kmh>=65?'80px':kmh>=63?'60px':'40px'};color:${kmh>65?'red':kmh>=63?'yellow':'white'};">${kmh.toFixed(1)} km/h</span>`;
  }, () => alert('位置情報を許可してください'), { enableHighAccuracy: true });
});

// RSS (NHK) - 上部横断幕用
const RSS_URL = "https://www.nhk.or.jp/rss/news/cat0.xml";
async function fetchRSS() {
  const newsDiv = document.getElementById("newsContent");
  const proxies = ['https://api.allorigins.win/raw?url=', 'https://corsproxy.io/?', 'https://cors-anywhere.herokuapp.com/'];
  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy + encodeURIComponent(RSS_URL), { timeout: 5000 });
      if (!res.ok) continue;
      const text = await res.text();
      if (!text || text.length < 100) continue;
      const xml = new DOMParser().parseFromString(text, "text/xml");
      if (xml.querySelector('parsererror')) continue;
      const items = xml.querySelectorAll("item");
      if (!items.length) continue;
      const news = Array.from(items).slice(0,5).map(item => ({ title: item.querySelector("title")?.textContent || "タイトルなし", link: item.querySelector("link")?.textContent || "#" }));
      newsDiv.innerHTML = '';
      news.forEach((n, i) => {
        const prefix = i === 0 ? '🚨' : '📻';
        const span = document.createElement("span");
        span.innerHTML = `${prefix} <a href="${n.link}" target="_blank" style="color:#ffa500;text-decoration:none;border-bottom:1px dotted #ffa500;">${n.title}</a>`;
        newsDiv.appendChild(span);
        if (i < news.length - 1) {
          const sep = document.createElement("span");
          sep.textContent = " ● ";
          sep.style.color = "#ff4444";
          newsDiv.appendChild(sep);
        }
      });
      document.getElementById("updateTime").textContent = `更新: ${new Date().toLocaleTimeString()}`;
      return;
    } catch(e) {}
  }
  newsDiv.innerHTML = '<span class="news-error">📻 ニュース取得に失敗しました</span>';
}
